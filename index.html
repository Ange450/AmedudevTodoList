<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Todo List Moderne - AmeduDev</title>


<style>

*{
    box-sizing:border-box;
}


body{

    margin:0;
    min-height:100vh;
    font-family:'Segoe UI', Arial, sans-serif;

    background:linear-gradient(135deg,#667eea,#764ba2);

    display:flex;
    justify-content:center;
    align-items:center;

}


.container{

    width:420px;
    background:white;

    padding:35px;

    border-radius:20px;

    box-shadow:
    0 20px 40px rgba(0,0,0,0.2);

}


h1{

    text-align:center;
    color:#333;
    margin-bottom:5px;

}


.subtitle{

    text-align:center;
    color:#777;
    margin-bottom:25px;

}



.input-area{

    display:flex;
    gap:10px;

}



input{

    flex:1;

    padding:14px;

    border-radius:10px;

    border:1px solid #ddd;

    font-size:15px;

}



button{

    border:none;

    cursor:pointer;

    border-radius:10px;

}



.add-btn{

    background:#667eea;

    color:white;

    padding:14px 18px;

    font-weight:bold;

}


.add-btn:hover{

    background:#5568d3;

}



ul{

    list-style:none;

    padding:0;

    margin-top:25px;

}



li{

    background:#f7f7f7;

    padding:15px;

    margin-bottom:12px;

    border-radius:12px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    animation:show .3s;

}



@keyframes show{

    from{

        opacity:0;
        transform:translateY(10px);

    }

    to{

        opacity:1;

    }

}



.task{

    display:flex;

    align-items:center;

    gap:10px;

}



.task.done span{

    text-decoration:line-through;

    color:#999;

}



.check{

    width:20px;
    height:20px;

}



.delete{

    background:#ff5c5c;

    color:white;

    padding:8px 12px;

}



.delete:hover{

    background:#e04444;

}



.counter{

    text-align:center;

    margin-top:20px;

    color:#666;

    font-size:14px;

}



.footer{

    text-align:center;

    margin-top:20px;

    font-size:12px;

    color:#aaa;

}


</style>

</head>



<body>


<div class="container">


<h1>✅ Todo List</h1>

<p class="subtitle">
Organisez vos tâches facilement
</p>



<div class="input-area">


<input 
id="taskInput"
placeholder="Ajouter une nouvelle tâche..."
>


<button class="add-btn" onclick="addTask()">
Ajouter
</button>


</div>



<ul id="taskList"></ul>



<div class="counter">

<span id="count">0</span> tâche(s)

</div>


<div class="footer">

Mon premier site publié avec GitHub Pages gratuitement 🚀

</div>


</div>



<script>


let tasks = JSON.parse(localStorage.getItem("tasks")) || [];



function save(){

    localStorage.setItem(
        "tasks",
        JSON.stringify(tasks)
    );

}



function display(){


const list=document.getElementById("taskList");


list.innerHTML="";


tasks.forEach((task,index)=>{


let li=document.createElement("li");


li.innerHTML=`

<div class="task ${task.done ? 'done':''}">

<input 
class="check"
type="checkbox"
${task.done ? "checked":""}
onclick="completeTask(${index})"
>

<span>${task.text}</span>

</div>


<button class="delete"
onclick="deleteTask(${index})">
Supprimer
</button>

`;


list.appendChild(li);


});


document.getElementById("count").innerHTML=tasks.length;


}



function addTask(){


let input=document.getElementById("taskInput");


if(input.value.trim()==""){

return;

}



tasks.push({

text:input.value,

done:false

});


input.value="";


save();

display();


}



function deleteTask(index){


tasks.splice(index,1);


save();

display();


}



function completeTask(index){


tasks[index].done=!tasks[index].done;


save();

display();


}



display();


</script>


</body>

</html>
